# GitLab CI/CD — session-orchestrator
# Version: 1.1 | 2026-04-19
#
# Pipeline: test → verify (schema-drift-check)
#
# Why GitLab CI rather than GitHub Actions:
#   The canonical vault-frontmatter schema lives in a *private* GitLab repo
#   (gitlab.gotzendorfer.at/infrastructure/projects-baseline, project ID 52).
#   Cross-project access during CI requires same-instance authentication via
#   CI_JOB_TOKEN — a mechanism only available within the same GitLab instance.
#   GitHub Actions has no equivalent for private GitLab resources, so the
#   schema-drift gate must live here.
#
# GitHub Actions mirror:
#   .github/workflows/test.yml intentionally runs a *subset* of CI: lint,
#   typecheck, and the bash + vitest test suites (no schema-drift check).
#   Leave that file untouched — it serves the public GitHub mirror only.

stages:
  - test
  - verify
  - coverage

variables:
  NODE_VERSION: "22"
  # Bump to bust stale CI cache
  CI_CACHE_VERSION: "v2"

# ---------------------------------------------------------------------------
# Shared setup anchor — npm install on alpine
# ---------------------------------------------------------------------------
.node-setup: &node-setup
  image: node:${NODE_VERSION}
  before_script:
    # jq is required by scripts/parse-config.sh, which is shelled out to
    # by tests/lib/config.test.mjs for bash↔node parity verification.
    - apt-get update -qq && apt-get install -y --no-install-recommends jq
    # git identity — required by subprocess-level integration tests that
    # shell out to git inside ephemeral tmp repos (multi-session-registry,
    # hook-smoke). Without this the runner throws "Author identity unknown"
    # and 30+ tests fail. CI-only; local dev inherits user's git config.
    - git config --global user.email "ci@session-orchestrator.local"
    - git config --global user.name "CI Runner"
    - npm ci
    # Install nested vault-sync deps (zod, yaml) — ignored by root npm ci
    - (cd skills/vault-sync && npm install --no-audit --no-fund --silent)
  cache:
    key:
      prefix: ${CI_CACHE_VERSION}
      files:
        - package-lock.json
    paths:
      - node_modules/

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------

test:
  <<: *node-setup
  stage: test
  interruptible: true
  timeout: 15m
  script:
    # Run vitest with a hard timeout and detect success via output marker.
    # Root cause of #268: vitest 2.1.9 + tinypool sometimes hangs at worker
    # exit AFTER all tests have passed (confirmed via trace inspection) —
    # process exit code stays non-zero, CI job hits its 15m timeout. Fix:
    # bound the runtime to 180s (tests finish locally in 5-10s; 180s gives
    # CI runner headroom), then check the captured output for the vitest
    # success marker. If the marker appears, exit 0 regardless of vitest's
    # own exit code. If tests actually failed, the marker won't appear and
    # the job fails as expected.
    # Force non-TTY output with plain reporter, strip ANSI codes, then count
    # per-file pass/fail markers. Decouples CI green signal from vitest's
    # exit sequence which hangs intermittently even after all tests pass.
    - 'timeout --preserve-status 240s npm test -- --reporter=verbose --no-color 2>&1 | tee /tmp/vitest.raw.log || true'
    - 'sed -r "s/\x1b\[[0-9;]*[mK]//g" /tmp/vitest.raw.log > /tmp/vitest.log || cp /tmp/vitest.raw.log /tmp/vitest.log'
    - 'tail -80 /tmp/vitest.log'
    # Match per-file ✓/✗ lines regardless of remaining ANSI artifacts.
    # Patterns stay intentionally permissive to survive reporter churn.
    - 'PASS_COUNT=$(grep -cE "(✓|PASS).*(tests|skills)/.*\.test\.mjs" /tmp/vitest.log 2>/dev/null || true)'
    - 'FAIL_COUNT=$(grep -cE "(✗|FAIL|❯ FAIL).*(tests|skills)/" /tmp/vitest.log 2>/dev/null || true)'
    - 'echo "[ci] test files passed=${PASS_COUNT:-0} failed=${FAIL_COUNT:-0}"'
    - 'test "${FAIL_COUNT:-0}" = "0"'
    - 'test "${PASS_COUNT:-0}" -ge "20"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: coverage (#263)
#
# Gated at 70% lines/functions/statements, 60% branches via vitest.config.mjs
# thresholds. Runs only on main + MRs targeting main. Fails the pipeline if
# coverage regresses below the threshold.
# ---------------------------------------------------------------------------

coverage:
  <<: *node-setup
  stage: coverage
  interruptible: true
  timeout: 15m
  needs:
    - test
  script:
    # Same wrapper pattern as `test` job to work around #268 vitest-tinypool
    # exit-hang. Coverage takes longer than plain tests (instrumentation
    # overhead), so timeout is 420s instead of 240s. Coverage artifacts are
    # written to disk BY vitest before the hang (v8 provider streams), so
    # the cobertura report remains valid even if we kill the process.
    - 'timeout --preserve-status 420s npm run test:coverage -- --reporter=verbose --no-color 2>&1 | tee /tmp/cov.raw.log || true'
    - 'sed -r "s/\x1b\[[0-9;]*[mK]//g" /tmp/cov.raw.log > /tmp/cov.log || cp /tmp/cov.raw.log /tmp/cov.log'
    - 'tail -100 /tmp/cov.log'
    - 'PASS_COUNT=$(grep -cE "(✓|PASS).*(tests|skills)/.*\.test\.mjs" /tmp/cov.log 2>/dev/null || true)'
    - 'FAIL_COUNT=$(grep -cE "(✗|FAIL|❯ FAIL).*(tests|skills)/" /tmp/cov.log 2>/dev/null || true)'
    - 'echo "[ci] coverage: test files passed=${PASS_COUNT:-0} failed=${FAIL_COUNT:-0}"'
    - 'test "${FAIL_COUNT:-0}" = "0"'
    - 'test "${PASS_COUNT:-0}" -ge "20"'
    # Verify coverage artifact was actually written before the hang.
    - 'test -f coverage/cobertura-coverage.xml && echo "[ci] coverage artifact present"'
    # If vitest exited with threshold failure, it prints "ERROR: Coverage ...":
    - '! grep -q "Coverage for .* .* below" /tmp/cov.log'
  coverage: '/^Lines\s+:\s+\d+(?:\.\d+)?%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 2 weeks
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: verify
#
# REQUIRES: projects-baseline (project ID 52) must list this project
# (infrastructure/session-orchestrator) in its CI/CD Job Token inbound
# allowlist. Without this, the git clone below will return HTTP 401.
#
# How to configure:
#   projects-baseline → Settings → CI/CD → Token Access →
#   "Allow CI job tokens from the following projects to access this project" →
#   Add: infrastructure/session-orchestrator
# ---------------------------------------------------------------------------

schema-drift-check:
  <<: *node-setup
  stage: verify
  interruptible: true
  timeout: 10m
  # TODO: flip to false once projects-baseline (#52) has this project on
  # its CI/CD Job Token inbound allowlist. Until then, the git clone
  # returns 403 and the job fails by design — but we do not want a
  # missing admin config to block every MR, so the failure is non-blocking.
  allow_failure: true
  needs:
    - test
  script:
    # Clone the canonical schema source from the same GitLab instance.
    # CI_JOB_TOKEN provides scoped read-only access when the allowlist is
    # configured (see comment block above this job).
    - >
      git clone --depth 1
      "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/infrastructure/projects-baseline.git"
      /tmp/projects-baseline
    # Run the drift-check — exits 0 if in sync, 1 if the local vendored copy
    # has diverged from the canonical schema. Diff is emitted to stderr.
    - >
      node scripts/sync-vault-schema.mjs
      --check
      --canonical /tmp/projects-baseline/packages/zod-schemas/src/vault-frontmatter.ts
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
