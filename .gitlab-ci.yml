# GitLab CI/CD — session-orchestrator
# Version: 1.1 | 2026-04-19
#
# Pipeline: test → verify (schema-drift-check)
#
# Why GitLab CI rather than GitHub Actions:
#   The canonical vault-frontmatter schema lives in a *private* GitLab repo
#   (<your-gitlab-host>/infrastructure/projects-baseline, project ID 52).
#   Cross-project access during CI requires same-instance authentication via
#   SCHEMA_DRIFT_TOKEN (deploy token/PAT) — a masked CI variable with
#   read-only access to the private projects-baseline repo (project ID 52).
#   GitHub Actions has no equivalent for private GitLab resources, so the
#   schema-drift gate must live here.
#
# GitHub Actions mirror:
#   .github/workflows/test.yml intentionally runs a *subset* of CI: lint,
#   typecheck, and the bash + vitest test suites (no schema-drift check).
#   Leave that file untouched — it serves the public GitHub mirror only.

# 2026-05-20 — Phase-4 Stufe-B cutover to hetzner-autoscaler-v2 (runner_id=3)
default:
  tags: [linux, hetzner-auto]

stages:
  - security
  - validate
  - test
  - verify
  - coverage
  - scheduled

variables:
  # Pinned to a specific 24.x patch (SEC-020: no floating minor/patch drift).
  # A `@sha256:` image digest pin is preferred for full immutability — bump
  # this patch and the digest together when updating. Used by every job that
  # runs `node:${NODE_VERSION}` (or `node:${NODE_VERSION}-alpine`).
  NODE_VERSION: "24.18.0"
  # Bump to bust stale CI cache
  CI_CACHE_VERSION: "v3"

# ---------------------------------------------------------------------------
# Shared setup anchor — npm install on alpine
# ---------------------------------------------------------------------------
.node-setup: &node-setup
  image: node:${NODE_VERSION}
  before_script:
    # jq is required by scripts/parse-config.sh, which is shelled out to
    # by tests/lib/config.test.mjs for bash↔node parity verification.
    # Guard for Mac shell-executor runners: image: directive is ignored on
    # the shell executor, so apt-get (Linux-only) isn't available. On macOS
    # jq is pre-installed via Apple Command Line Tools (/usr/bin/jq). Only
    # install when jq is genuinely absent (Linux Docker path). See #408.
    - command -v jq >/dev/null || (apt-get update -qq && apt-get install -y --no-install-recommends jq)
    # git identity — required by subprocess-level integration tests that
    # shell out to git inside ephemeral tmp repos (multi-session-registry,
    # hook-smoke). Without this the runner throws "Author identity unknown"
    # and 30+ tests fail. CI-only; local dev inherits user's git config.
    - git config --global user.email "ci@session-orchestrator.local"
    - git config --global user.name "CI Runner"
    - npm ci
    # package-manager guard (#715) — verify node_modules matches the
    # committed npm lockfile immediately after a fresh install. This is what
    # actually exercises w1/w2/w3 (working-tree drift) against a REAL
    # node_modules tree in every node job — npm's own `preinstall`/`pretest`
    # lifecycle hooks are DEAD under this repo's `ignore-scripts=true`
    # (.npmrc), so they cannot be relied on here either. The standalone
    # `package-manager-guard` job below covers only the cheap committed-tree
    # (c1/c2) invariant, with no node_modules required.
    - node scripts/check-package-manager.mjs
    # Install nested vault-sync deps (zod, yaml) — ignored by root npm ci.
    # Use `npm install`: skills/vault-sync/package-lock.json is gitignored (.gitignore),
    # so it is absent in CI's fresh clone — `npm ci` would EUSAGE-fail (no lockfile).
    - (cd skills/vault-sync && npm install --no-audit --no-fund)
  cache:
    key:
      prefix: ${CI_CACHE_VERSION}
      files:
        - package-lock.json
    paths:
      - node_modules/

# ---------------------------------------------------------------------------
# Stage: security (#350, #351)
#
# Two gates run before tests:
#   gitleaks-scan  — scans the working tree for committed secrets
#   npm-audit      — runs `npm audit --audit-level=high --omit=dev`
#
# Both fail the pipeline on findings. The npm-audit job uses
# --audit-level=high (matches `audit-level=high` in .npmrc); to bypass a
# false positive temporarily, override per-pipeline via CI variable
# AUDIT_LEVEL=critical (still gates on critical) — never silently ignore.
# ---------------------------------------------------------------------------

gitleaks-scan:
  stage: security
  # zricethezav/gitleaks:latest has `gitleaks` as ENTRYPOINT, which causes
  # the default GitLab Runner script-wrapper (`sh -c <script>`) to fail with
  # `unknown command "sh" for "gitleaks"`. Override the entrypoint to an
  # empty string so the runner can invoke `sh` directly. See #408 (recurrence
  # of cb3e942-era CI-image breakage).
  image:
    # Pinned (SEC-020: no floating `:latest` — a moving tag is a supply-chain
    # risk). A `@sha256:` digest pin is preferred for full immutability; bump
    # the tag and digest together when updating.
    name: zricethezav/gitleaks:v8.30.1
    entrypoint: [""]
  interruptible: true
  timeout: 5m
  script:
    - gitleaks detect --source . --redact --no-banner --config .gitleaks.toml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

npm-audit:
  stage: security
  image: node:${NODE_VERSION}
  interruptible: true
  timeout: 5m
  variables:
    AUDIT_LEVEL: "high"
  script:
    # --omit=dev: only production deps gate the pipeline. Dev deps may
    # carry advisories without affecting shipped runtime.
    # --audit-level: high by default; set AUDIT_LEVEL=critical via CI
    # variable to temporarily lower the bar while triaging a false positive.
    - npm audit --audit-level=${AUDIT_LEVEL} --omit=dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: validate
#
# plugin-schema-validate — verify .claude-plugin manifests conform to the
# canonical schemastore.org JSON Schema definitions (issue #433).
# Uses scripts/validate-plugin-manifests.mjs (project-pinned AJV via
# ajv-loader.mjs, host-pinned schemastore fetch; replaces unpinned global
# ajv-cli — #475). Runs on changes to .claude-plugin/*.json or CI config.
# ---------------------------------------------------------------------------

# lint / typecheck — the canonical GitLab pipeline gates code style + types
# here (previously these ran only in the GitHub mirror, leaving the canonical
# pipeline blind to lint/type regressions). `<<: *node-setup` installs
# node_modules, so `npm run *` resolves the local eslint bin from
# node_modules/.bin (no PATH export needed — npm-run handles it; cf. TS-001).
lint:
  stage: validate
  <<: *node-setup
  interruptible: true
  timeout: 10m
  allow_failure: false
  script:
    # npm run lint → `eslint .`
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

typecheck:
  stage: validate
  <<: *node-setup
  interruptible: true
  timeout: 10m
  allow_failure: false
  script:
    # npm run typecheck → `node scripts/typecheck.mjs`
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

owner-leakage:
  stage: validate
  <<: *node-setup
  interruptible: true
  timeout: 5m
  allow_failure: false
  script:
    - node scripts/lib/validate/check-owner-leakage.mjs "$CI_PROJECT_DIR"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# fixture-shape — scan tracked tests/**/*.{mjs,ts,js} for live-credential
# shape patterns (sk_live_, xoxb-<digits>, AKIA…, AIzaSy…) that would block
# a public GitHub-mirror push. Parity with the pre-commit hook (#556).
fixture-shape:
  stage: validate
  <<: *node-setup
  interruptible: true
  timeout: 5m
  allow_failure: false
  script:
    - node scripts/lib/validate/check-test-fixture-shapes.mjs "$CI_PROJECT_DIR"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

plugin-schema-validate:
  stage: validate
  <<: *node-setup
  interruptible: true
  timeout: 5m
  script:
    - node scripts/validate-plugin-manifests.mjs "$CI_PROJECT_DIR"
  rules:
    - changes:
        - .claude-plugin/*.json
        - .gitlab-ci.yml
  allow_failure: false

# package-manager-guard — recurrence guard for the pnpm/npm working-tree drift
# incident class (#715): a bare `pnpm install` at repo root silently rewrites
# node_modules to a pnpm layout, and a stray gitignored pnpm-lock.yaml never
# shows up in CI's own clone. This job asserts the COMMITTED tree invariant
# (pnpm-lock.yaml never tracked, package-lock.json tracked) via `git
# ls-files` — the cheap, node_modules-free half of the same guard that is
# also wired into the `.node-setup` before_script above (real node_modules,
# right after `npm ci`) and into `.husky/pre-commit` locally. npm's own
# `preinstall`/`pretest` lifecycle hooks are DEAD under this repo's
# `ignore-scripts=true` (.npmrc) — they are NOT part of the enforcement
# chain. The script is Node-stdlib-only and needs no node_modules, so this
# job intentionally skips the shared `.node-setup` anchor (no npm ci) to
# stay cheap — same lightweight image-only pattern as npm-audit above.
package-manager-guard:
  stage: validate
  image: node:${NODE_VERSION}
  interruptible: true
  timeout: 5m
  allow_failure: false
  script:
    - node scripts/check-package-manager.mjs
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------

test:
  <<: *node-setup
  stage: test
  interruptible: true
  parallel: 4    # 4 shards — GitLab injects CI_NODE_INDEX (1-based) + CI_NODE_TOTAL=4
  timeout: 20m   # per-shard ceiling over the inner 900s per-shard vitest cap
  script:
    # Pass/fail is read from vitest's machine-readable JSON result via a
    # FAIL-CLOSED verifier — never by grepping stdout markers. The old
    # grep-the-markers heuristic shipped a 12-failure suite as GREEN: under
    # runner contention the suite ran 257s > the 240s `timeout` cap, vitest was
    # killed BEFORE printing its failure-summary block, `|| true` swallowed the
    # kill, and the `FAIL`/`✗` grep matched nothing (the verbose reporter marks
    # failures with `×`). Same silent-regression class as the 8-pipeline incident
    # (CLAUDE.md Critical Gotchas). See scripts/ci/assert-vitest-green.mjs.
    #
    # SHARDED (4 shards × 900s) on the Hetzner Linux autoscaler (tags: hetzner-auto,
    # Docker node:24 — runs as ROOT). The full ~10008-test suite is slow on a small
    # autoscaled instance; a single un-sharded job's inner `timeout` killed vitest
    # before it wrote the onFinished JSON, so the verifier (correctly) failed CLOSED
    # on the missing file even though the code was green locally. The fix is to SHARD
    # the suite, NOT to widen blindly: `parallel: 4` splits the ~450 files into four
    # independent shards via vitest's `--shard=i/n`, each on its own autoscaled runner.
    # Each shard self-verifies its own JSON with a per-shard floor.
    #
    # Cap history: pipeline #5844 ran 3 shards × 660s — shard 2/3 took 675s > 660s
    # (uneven file-weight: vitest --shard splits by file COUNT, not duration, so one
    # shard collected the heavy cross-process/lock/backfill files) → killed → ENOENT.
    # Fix: 4 shards (smaller per-shard weight) + a 900s inner cap (headroom over the
    # observed 675s). NOTE the runner runs as ROOT, so chmod-readonly-to-force-a-write-
    # failure tests are guarded with skipIf(isRoot) (tests/_helpers/perms.mjs) — root
    # bypasses permission bits, which previously surfaced as real shard failures.
    #
    # The JSON file is written by vitest at onFinished — after all tests run:
    #   - real failures            → JSON success:false  → verifier exits 1
    #   - run truncated/killed      → JSON absent/partial → verifier fails CLOSED
    #   - post-completion exit-hang → JSON success:true   → verifier passes (the
    #                                 hung non-zero exit is swallowed by `|| true`)
    # The inner per-shard `timeout` (900s) must EXCEED a single shard's true runtime
    # so vitest reaches onFinished and writes the JSON. Per-shard result/log files are
    # suffixed with $CI_NODE_INDEX so concurrent shards never clobber one another.
    #
    # Per-shard floor --min-tests=1500: ~10008/4 ≈ 2502 real tests per shard, so 1500
    # still clears the genuine subset while catching a truncated/empty shard. On a hang
    # the verifier is passed --log so it names the test files that were in-flight at the
    # kill (self-diagnosing) instead of a bare ENOENT.
    - 'rm -f /tmp/vitest-result-$CI_NODE_INDEX.json'   # stale-file guard on reused shell-executor hosts
    - 'timeout --preserve-status 900s npm test -- --shard=$CI_NODE_INDEX/$CI_NODE_TOTAL --reporter=default --reporter=json --outputFile=/tmp/vitest-result-$CI_NODE_INDEX.json --no-color 2>&1 | tee /tmp/vitest-$CI_NODE_INDEX.log || true'
    - 'tail -40 /tmp/vitest-$CI_NODE_INDEX.log'
    - 'node scripts/ci/assert-vitest-green.mjs /tmp/vitest-result-$CI_NODE_INDEX.json --min-tests=1500 --log=/tmp/vitest-$CI_NODE_INDEX.log'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: coverage (#263)
#
# Gated at 70% lines/functions/statements, 60% branches via vitest.config.mjs
# thresholds. Runs only on main + MRs targeting main. Fails the pipeline if
# coverage regresses below the threshold.
# ---------------------------------------------------------------------------

coverage:
  <<: *node-setup
  stage: coverage
  interruptible: true
  timeout: 30m   # headroom over the inner 1500s cov cap (instrumentation is slower than plain test)
  needs:
    - test
  script:
    # Same fail-closed JSON verifier as the `test` job (see its comment +
    # scripts/ci/assert-vitest-green.mjs). Coverage takes longer than plain
    # tests (instrumentation overhead), so the inner cap is 1500s (25m) under
    # the 30m job ceiling — the cap must EXCEED the true instrumented runtime so
    # vitest writes the JSON before any tinypool exit-hang is killed. The
    # cobertura artifact + the threshold-breach grep below are SEPARATE gates
    # from test-green: the JSON `success` field reflects test pass/fail, not the
    # coverage threshold.
    - 'rm -f /tmp/cov-result.json'   # stale-file guard on reused shell-executor hosts
    # --exclude excludes the heavy 3-subprocess integration test from the v8-instrumented
    # coverage lane ONLY (it still runs in the `test:` shards). Per #691 durable fix: it flakes
    # only under v8 coverage instrumentation (contention-fragile in the slowest lane) and its
    # coverage is redundant — 128 unit tests cover the same hook/registry lines.
    # #686 item 1 (shard re-eval) deferred — see issue; no functional shard change here.
    - 'timeout --preserve-status 1500s npm run test:coverage -- --exclude "tests/integration/multi-session-registry.test.mjs" --reporter=default --reporter=json --outputFile=/tmp/cov-result.json --no-color 2>&1 | tee /tmp/cov.log || true'
    - 'tail -60 /tmp/cov.log'
    - 'node scripts/ci/assert-vitest-green.mjs /tmp/cov-result.json'
    # Verify the cobertura artifact was actually written.
    - 'test -f coverage/cobertura-coverage.xml && echo "[ci] coverage artifact present"'
    # Threshold gate: vitest prints "Coverage for X (n%) does not meet … below".
    - '! grep -q "Coverage for .* .* below" /tmp/cov.log'
  coverage: '/^Lines\s+:\s+\d+(?:\.\d+)?%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 2 weeks
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: verify
#
# REQUIRES: a GitLab Deploy Token or PAT stored as the masked CI variable
# SCHEMA_DRIFT_TOKEN with read-only access to infrastructure/projects-baseline
# (project ID 52). See docs/ci-setup.md for step-by-step token creation.
#
# If SCHEMA_DRIFT_TOKEN is unset (e.g. on a fork or before the variable is
# configured), the job emits a warning and exits 0 so it does not block the
# pipeline. Set the variable to activate the check.
# ---------------------------------------------------------------------------

schema-drift-check:
  <<: *node-setup
  stage: verify
  interruptible: true
  timeout: 10m
  allow_failure: false
  needs:
    - test
  script:
    # Guard: skip gracefully when the token variable is not configured.
    # This avoids blocking pipelines on forks or fresh environments where
    # SCHEMA_DRIFT_TOKEN has not yet been set in GitLab CI/CD settings.
    - >
      if [ -z "${SCHEMA_DRIFT_TOKEN}" ]; then
        echo "WARNING: schema-drift-check skipped — SCHEMA_DRIFT_TOKEN is not set.";
        echo "See docs/ci-setup.md to configure a deploy token for infrastructure/projects-baseline.";
        exit 0;
      fi
    # Clone the canonical schema source using a deploy token or PAT.
    # SCHEMA_DRIFT_TOKEN must be a masked CI variable with read_repository
    # scope on infrastructure/projects-baseline (project ID 52).
    # See docs/ci-setup.md for token creation steps.
    - >
      git clone --depth 1
      "https://oauth2:${SCHEMA_DRIFT_TOKEN}@${CI_SERVER_HOST}/infrastructure/projects-baseline.git"
      /tmp/projects-baseline
    # Run the drift-check — exits 0 if in sync, 1 if the local vendored copy
    # has diverged from the canonical schema. Diff is emitted to stderr.
    - >
      node scripts/sync-vault-schema.mjs
      --check
      --canonical /tmp/projects-baseline/packages/zod-schemas/src/vault-frontmatter.ts
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: scheduled
#
# vault-watcher — daily watcher for vault-integration warn→strict flip (#306).
#
# Runs via GitLab CI Scheduled Pipeline. Configure in GitLab UI:
#   CI/CD → Schedules → New schedule:
#     Description: vault-watcher
#     Cron: 0 7 * * *          (07:00 UTC = 09:00 Europe/Vienna)
#     Target branch: main
#     Variables: SCHEDULE_NAME = vault-watcher
#
# Required CI variable (masked + protected):
#   WATCHER_GITLAB_TOKEN — project token with api + write_comments scope
#   on infrastructure/session-orchestrator. Set in:
#   GitLab → Settings → CI/CD → Variables → Add variable.
#
# Manual trigger for testing (GitLab UI):
#   CI/CD → Pipelines → Run pipeline → add variable SCHEDULE_NAME=vault-watcher
#
# The schedule itself is controlled by the GitLab UI — no code change needed
# to enable/disable. The job is dormant in all non-scheduled pipelines
# thanks to the rule below.
# ---------------------------------------------------------------------------

vault-watcher:
  stage: scheduled
  # Pinned to ${NODE_VERSION} patch (SEC-020: no floating tag). A `@sha256:`
  # image digest pin is preferred for full immutability.
  image: node:${NODE_VERSION}-alpine
  before_script:
    # coreutils provides GNU sha256sum — busybox's lacks `--ignore-missing`,
    # which the glab checksum verification below relies on.
    - apk add --no-cache git curl bash coreutils
    # Install glab CLI — pinned $GLAB_VERSION + checksum-verified download
    # (SEC-020: no floating `latest`, integrity-verified artifact, and NOT a
    # `curl | tar` pipe — the tarball is fetched to disk and its sha256 checked
    # against the release's checksums.txt BEFORE extraction). To bump: change
    # GLAB_VERSION below; checksums.txt is pulled from the matching release.
    - >
      cd /tmp &&
      GLAB_TARBALL="glab_${GLAB_VERSION#v}_linux_amd64.tar.gz" &&
      curl -sSfL -o "$GLAB_TARBALL"
      "https://gitlab.com/gitlab-org/cli/-/releases/${GLAB_VERSION}/downloads/${GLAB_TARBALL}" &&
      curl -sSfL -o checksums.txt
      "https://gitlab.com/gitlab-org/cli/-/releases/${GLAB_VERSION}/downloads/checksums.txt" &&
      sha256sum --ignore-missing -c checksums.txt &&
      tar xzf "$GLAB_TARBALL" -C /tmp &&
      mv /tmp/bin/glab /usr/local/bin/glab &&
      chmod +x /usr/local/bin/glab
    # Configure glab to use this GitLab instance + token
    - glab config set -g token "$WATCHER_GITLAB_TOKEN"
    - glab config set -g gitlab_host "$CI_SERVER_HOST"
    - npm ci
  script:
    - node scripts/vault-integration-watcher.mjs --verbose
  variables:
    GITLAB_TOKEN: $WATCHER_GITLAB_TOKEN
    # glab CLI release to install (checksum-verified in before_script). Bump in
    # lockstep with any change to the download/verify block above.
    GLAB_VERSION: "v1.105.0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_NAME == "vault-watcher"'
