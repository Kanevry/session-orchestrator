name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Security gates — run on Linux only, fail fast (#350, #351)
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Setup Node 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: npm audit (production deps, high+)
        # --audit-level=high matches `audit-level=high` in .npmrc.
        # --omit=dev: only production deps gate the pipeline. Dev deps may
        # carry advisories without affecting shipped runtime.
        run: npm audit --audit-level=high --omit=dev

  test:
    needs: security
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: npm

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Verify environment (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash --version | head -1
          git --version
          jq --version

      - name: Configure git identity (all platforms)
        shell: bash
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test.com"

      - name: Install Node dependencies
        run: npm ci

      - name: Install nested vault-sync deps
        shell: bash
        run: (cd skills/vault-sync && npm install --no-audit --no-fund --silent)

      - name: Lint
        run: npm run lint

      - name: Typecheck (.mjs files — Wave 3+)
        shell: bash
        run: |
          if ls hooks/*.mjs scripts/lib/*.mjs 2>/dev/null | grep -q .; then
            npm run typecheck
          else
            echo "No .mjs files yet (Wave 3 adds them) — skipping typecheck"
          fi

      # On Linux the tinypool exit-hang (#268, upstream vitest issue #3077)
      # still occurs occasionally with vitest 4 + pool=forks: the runner
      # hangs at worker teardown AFTER all tests have passed. Without a
      # wrapper the job hits the 15-min workflow timeout. Mirrors the
      # GitLab CI remediation in .gitlab-ci.yml. Windows + macOS do not
      # exhibit the hang — keep the plain `npm test` path for them.
      - name: Vitest (Linux — wrapped)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          timeout --preserve-status 240s npm test -- --reporter=verbose --no-color 2>&1 | tee /tmp/vitest.raw.log || true
          sed -r 's/\x1b\[[0-9;]*[mK]//g' /tmp/vitest.raw.log > /tmp/vitest.log || cp /tmp/vitest.raw.log /tmp/vitest.log
          tail -80 /tmp/vitest.log
          PASS_COUNT=$(grep -cE "(✓|PASS).*(tests|skills)/.*\.test\.mjs" /tmp/vitest.log 2>/dev/null || true)
          FAIL_COUNT=$(grep -cE "(✗|FAIL|❯ FAIL).*(tests|skills)/" /tmp/vitest.log 2>/dev/null || true)
          echo "[ci] test files passed=${PASS_COUNT:-0} failed=${FAIL_COUNT:-0}"
          test "${FAIL_COUNT:-0}" = "0"
          test "${PASS_COUNT:-0}" -ge "20"

      - name: Vitest (macOS + Windows — plain)
        if: runner.os != 'Linux'
        shell: bash
        run: npm test

      - name: Coverage (Linux only, gated at 70% lines/funcs/stmts, 60% branches)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          timeout --preserve-status 420s npm run test:coverage -- --reporter=verbose --no-color 2>&1 | tee /tmp/cov.raw.log || true
          sed -r 's/\x1b\[[0-9;]*[mK]//g' /tmp/cov.raw.log > /tmp/cov.log || cp /tmp/cov.raw.log /tmp/cov.log
          tail -100 /tmp/cov.log
          PASS_COUNT=$(grep -cE "(✓|PASS).*(tests|skills)/.*\.test\.mjs" /tmp/cov.log 2>/dev/null || true)
          FAIL_COUNT=$(grep -cE "(✗|FAIL|❯ FAIL).*(tests|skills)/" /tmp/cov.log 2>/dev/null || true)
          echo "[ci] coverage: test files passed=${PASS_COUNT:-0} failed=${FAIL_COUNT:-0}"
          test "${FAIL_COUNT:-0}" = "0"
          test "${PASS_COUNT:-0}" -ge "20"
          test -f coverage/cobertura-coverage.xml && echo "[ci] coverage artifact present"
          ! grep -q "Coverage for .* .* below" /tmp/cov.log
